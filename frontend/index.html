<!DOCTYPE html>
<html>
<head>
<title>Contact App</title>
</head>
<body>

<h1>Contact Book people of hyderbadddd</h1>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="addContact()">Add</button>

<ul id="list"></ul>

<script>
const BASE_URL = "http://13.48.147.222:3000";  // ✅ FIXED

async function load(){
 let res = await fetch(BASE_URL + '/contacts');
 let data = await res.json();

 let html = '';
 data.forEach(x=>{
   html += `<li>${x.name} - ${x.phone}
   <button onclick="del(${x.id})">Delete</button></li>`;
 });

 document.getElementById('list').innerHTML = html;
}

async function addContact(){
 await fetch(BASE_URL + '/contacts',{
 method:'POST',
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({
   name:document.getElementById('name').value,
   phone:document.getElementById('phone').value
 })
});
load();
}

async function del(id){
 await fetch(BASE_URL + '/contacts/' + id,{
 method:'DELETE'
});
load();
}

load();
</script>

</body>
</html>
